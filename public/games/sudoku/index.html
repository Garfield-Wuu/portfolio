<!DOCTYPE html>
<html>
<head>
<title>Sudoku</title>
<style>
  body { display: flex; flex-direction: column; align-items: center; font-family: sans-serif; background: transparent; margin-top: 30px; }
  .board { display: grid; grid-template-columns: repeat(9, 36px); grid-template-rows: repeat(9, 36px); gap: 1px; background: transparent; border: 2px solid #000; }
  .cell { width: 36px; height: 36px; min-width: 32px; min-height: 32px; text-align: center; font-size: 18px; border: none; outline: none; background: transparent; touch-action: manipulation; }
  .sudoku-numpad { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 360px; margin: 16px auto 0; }
  .sudoku-numpad button { min-width: 44px; min-height: 44px; margin: 0 !important; font-size: 16px !important; }
  .cell:nth-child(3n) { border-right: 2px solid #000; }
  .cell:nth-child(9n) { border-right: none; }
  .row-3 .cell, .row-6 .cell { border-bottom: 2px solid #000; }
  .cell[readonly] { background: transparent; font-weight: bold; color: #333; }
  button { margin-top: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
</style>
  <link rel="stylesheet" href="../shared-arcade.css">
</head>
<body>
  <h1>Sudoku</h1>
  <div class="board" id="board"></div>
  <div id="numpad" class="sudoku-numpad" aria-label="数字键盘"></div>
  <button onclick="check()">Check Solution</button>
  <p id="msg"></p>

<script>
  const puzzle = [
    [5,3,0,0,7,0,0,0,0],
    [6,0,0,1,9,5,0,0,0],
    [0,9,8,0,0,0,0,6,0],
    [8,0,0,0,6,0,0,0,3],
    [4,0,0,8,0,3,0,0,1],
    [7,0,0,0,2,0,0,0,6],
    [0,6,0,0,0,0,2,8,0],
    [0,0,0,4,1,9,0,0,5],
    [0,0,0,0,8,0,0,7,9]
  ];
  const boardEl = document.getElementById('board');
  let inputs = [];
  let focusInput = null;

  for(let r=0; r<9; r++) {
    let divRow = document.createElement('div');
    divRow.className = 'row-' + (r+1);
    divRow.style.display = 'contents';
    for(let c=0; c<9; c++) {
      let input = document.createElement('input');
      input.className = 'cell';
      input.maxLength = 1;
      if(puzzle[r][c] !== 0) {
        input.value = puzzle[r][c];
        input.readOnly = true;
      }
      boardEl.appendChild(input);
      inputs.push(input);
      if (puzzle[r][c] === 0) {
        input.addEventListener('focus', function () { focusInput = input; });
      }
      if(c===8 && (r===2 || r===5)) {
        input.style.borderBottom = "2px solid #000";
      }
    }
  }

  (function buildNumpad() {
    var pad = document.getElementById('numpad');
    if (!pad) return;
    function targetCell() {
      if (focusInput && !focusInput.readOnly) return focusInput;
      return inputs.find(function (i) { return !i.readOnly; });
    }
    for (var d = 1; d <= 9; d++) {
      (function (digit) {
        var b = document.createElement('button');
        b.type = 'button';
        b.textContent = String(digit);
        b.addEventListener('pointerup', function (ev) {
          ev.preventDefault();
          var t = targetCell();
          if (t) t.value = String(digit);
        });
        pad.appendChild(b);
      })(d);
    }
    var clearBtn = document.createElement('button');
    clearBtn.type = 'button';
    clearBtn.textContent = '清除';
    clearBtn.addEventListener('pointerup', function (ev) {
      ev.preventDefault();
      var t = targetCell();
      if (t && !t.readOnly) t.value = '';
    });
    pad.appendChild(clearBtn);
  })();

  function check() {
    let grid = [];
    for(let i=0; i<9; i++) {
      grid.push([]);
      for(let j=0; j<9; j++) {
        let val = parseInt(inputs[i*9+j].value);
        if(isNaN(val) || val < 1 || val > 9) {
          document.getElementById('msg').innerText = "Please fill all cells with 1-9.";
          return;
        }
        grid[i].push(val);
      }
    }
    
    let valid = true;
    for(let i=0; i<9; i++) {
      let rSet = new Set(), cSet = new Set();
      for(let j=0; j<9; j++) {
        rSet.add(grid[i][j]);
        cSet.add(grid[j][i]);
      }
      if(rSet.size !== 9 || cSet.size !== 9) valid = false;
    }
    
    for(let r=0; r<9; r+=3) {
      for(let c=0; c<9; c+=3) {
        let bSet = new Set();
        for(let i=0; i<3; i++) {
          for(let j=0; j<3; j++) bSet.add(grid[r+i][c+j]);
        }
        if(bSet.size !== 9) valid = false;
      }
    }
    
    if(valid) document.getElementById('msg').innerText = "Congratulations! You solved it!";
    else document.getElementById('msg').innerText = "Incorrect solution. Try again.";
  }
</script>

<script>
// --- Game Focus & Scroll Prevention ---
if (!window.__game_focus_injected) {
  window.__game_focus_injected = true;
  window.addEventListener('click', (e) => { if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') window.focus(); });
  window.addEventListener('keydown', (e) => {
    if(['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
      e.preventDefault();
    }
  });
}
// --------------------------------------
</script>

</body>
</html>
