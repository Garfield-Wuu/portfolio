<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>俄罗斯方块</title>
<style>
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: transparent; margin: 0; color: white; font-family: sans-serif; }
  canvas { background: transparent; border: 2px solid #555; }
  .info { display: flex; justify-content: space-between; width: 200px; margin-bottom: 10px; }
</style>
  <link rel="stylesheet" href="../shared-arcade.css">
</head>
<body data-mobile-pad="tetris">
  <h2>俄罗斯方块</h2>
  <div class="info">
    <span>得分: <span id="score">0</span></span>
  </div>
  <canvas id="gameCanvas" width="200" height="400"></canvas>
<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');

  const COLS = 10;
  const ROWS = 20;
  const BLOCK_SIZE = 20;

  let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
  let score = 0;
  let gameOver = false;

  const SHAPES = [
    [],
    [[1,1,1,1]], // I
    [[1,1],[1,1]], // O
    [[0,1,0],[1,1,1]], // T
    [[1,0,0],[1,1,1]], // L
    [[0,0,1],[1,1,1]], // J
    [[0,1,1],[1,1,0]], // S
    [[1,1,0],[0,1,1]]  // Z
  ];
  const COLORS = [null, "#00d4ff", "#ffea00", "#a855f7", "#ff7300", "#3b82f6", "#00ffcc", "#ff0055"];

  let piece = null;

  function newPiece() {
    let typeId = Math.floor(Math.random() * 7) + 1;
    let shape = SHAPES[typeId];
    piece = {
      shape: shape,
      color: COLORS[typeId],
      x: Math.floor(COLS / 2) - Math.floor(shape[0].length / 2),
      y: 0
    };
    if (collide()) {
      gameOver = true;
    }
  }

  function drawBlock(x, y, color) {
    // Fill background
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.8;
    ctx.fillRect(x, y, BLOCK_SIZE, BLOCK_SIZE);
    
    // Add inner glow / shadow for 3D effect
    ctx.globalAlpha = 1.0;
    ctx.strokeStyle = "rgba(255, 255, 255, 0.6)";
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 1, y + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
    
    // Add top highlight
    ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
    ctx.fillRect(x + 1, y + 1, BLOCK_SIZE - 2, 3);
    
    // Shadow reset
    ctx.shadowColor = color;
    ctx.shadowBlur = 5;
    ctx.strokeRect(x, y, BLOCK_SIZE, BLOCK_SIZE);
    ctx.shadowBlur = 0;
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Grid background
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for(let r = 0; r <= ROWS; r++) { ctx.moveTo(0, r * BLOCK_SIZE); ctx.lineTo(canvas.width, r * BLOCK_SIZE); }
    for(let c = 0; c <= COLS; c++) { ctx.moveTo(c * BLOCK_SIZE, 0); ctx.lineTo(c * BLOCK_SIZE, canvas.height); }
    ctx.stroke();
    
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (board[r][c]) {
          drawBlock(c * BLOCK_SIZE, r * BLOCK_SIZE, board[r][c]);
        }
      }
    }
    if (piece) {
      for (let r = 0; r < piece.shape.length; r++) {
        for (let c = 0; c < piece.shape[r].length; c++) {
          if (piece.shape[r][c]) {
            drawBlock((piece.x + c) * BLOCK_SIZE, (piece.y + r) * BLOCK_SIZE, piece.color);
          }
        }
      }
    }
  }

  function collide() {
    for (let r = 0; r < piece.shape.length; r++) {
      for (let c = 0; c < piece.shape[r].length; c++) {
        if (!piece.shape[r][c]) continue;
        let nx = piece.x + c;
        let ny = piece.y + r;
        if (nx < 0 || nx >= COLS || ny >= ROWS || board[ny][nx]) return true;
      }
    }
    return false;
  }

  function merge() {
    for (let r = 0; r < piece.shape.length; r++) {
      for (let c = 0; c < piece.shape[r].length; c++) {
        if (piece.shape[r][c]) {
          board[piece.y + r][piece.x + c] = piece.color;
        }
      }
    }
    clearLines();
    newPiece();
  }

  function clearLines() {
    let lines = 0;
    for (let r = ROWS - 1; r >= 0; r--) {
      let full = true;
      for (let c = 0; c < COLS; c++) {
        if (!board[r][c]) { full = false; break; }
      }
      if (full) {
        board.splice(r, 1);
        board.unshift(Array(COLS).fill(0));
        lines++;
        r++;
      }
    }
    if (lines > 0) {
      score += lines * 10;
      scoreEl.textContent = score;
    }
  }

  function move(dx, dy) {
    if (gameOver) return;
    piece.x += dx;
    piece.y += dy;
    if (collide()) {
      piece.x -= dx;
      piece.y -= dy;
      if (dy === 1) {
        merge();
      }
    }
    draw();
  }

  function rotate() {
    if (gameOver) return;
    let oldShape = piece.shape;
    let newShape = [];
    for (let c = 0; c < oldShape[0].length; c++) {
      let row = [];
      for (let r = oldShape.length - 1; r >= 0; r--) {
        row.push(oldShape[r][c]);
      }
      newShape.push(row);
    }
    piece.shape = newShape;
    if (collide()) {
      piece.shape = oldShape; // revert
    }
    draw();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.code === 'ArrowLeft') move(-1, 0);
    else if (e.key === 'ArrowRight' || e.code === 'ArrowRight') move(1, 0);
    else if (e.key === 'ArrowDown' || e.code === 'ArrowDown') move(0, 1);
    else if (e.key === 'ArrowUp' || e.code === 'ArrowUp') rotate();
  });

  newPiece();
  setInterval(() => {
    move(0, 1);
  }, 500);
</script>

<script>
// --- Game Focus & Scroll Prevention ---
if (!window.__game_focus_injected) {
  window.__game_focus_injected = true;
  window.addEventListener('click', () => window.focus());
  window.addEventListener('keydown', (e) => {
    if(['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
      e.preventDefault();
    }
  });
}
// --------------------------------------
</script>
<script src="../shared-mobile-pad.js"></script>

</body>
</html>
