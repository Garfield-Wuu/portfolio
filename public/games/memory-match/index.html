<!DOCTYPE html>
<html>
<head>
<title>Memory Match</title>
<style>
  body { display: flex; flex-direction: column; align-items: center; font-family: sans-serif; background: transparent; margin-top: 30px; }
  .grid { display: grid; grid-template-columns: repeat(4, 100px); gap: 10px; perspective: 1000px; }
  .card { width: 100px; height: 100px; position: relative; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
  .card.flipped { transform: rotateY(180deg); }
  .front, .back { width: 100%; height: 100%; position: absolute; backface-visibility: hidden; display: flex; justify-content: center; align-items: center; font-size: 40px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
  .front { background: transparent; }
  .back { background: transparent; transform: rotateY(180deg); border: 2px solid #ccc; }
</style>
  <link rel="stylesheet" href="../shared-arcade.css">
</head>
<body>
  <h1>Memory Match</h1>
  <p>Moves: <span id="moves">0</span></p>
  <div class="grid" id="grid"></div>

<script>
  const emojis = ['🍎','🍌','🍇','🍉','🍓','🍒','🍍','🥝'];
  const cards = [...emojis, ...emojis].sort(() => 0.5 - Math.random());
  const grid = document.getElementById('grid');
  let hasFlippedCard = false;
  let lockBoard = false;
  let firstCard, secondCard;
  let matches = 0;
  let moves = 0;

  cards.forEach((emoji, index) => {
    const card = document.createElement('div');
    card.classList.add('card');
    card.dataset.emoji = emoji;
    card.innerHTML = `<div class="front"></div><div class="back">${emoji}</div>`;
    card.addEventListener('click', flipCard);
    grid.appendChild(card);
  });

  function flipCard() {
    if (lockBoard || this === firstCard) return;
    this.classList.add('flipped');

    if (!hasFlippedCard) {
      hasFlippedCard = true;
      firstCard = this;
      return;
    }

    secondCard = this;
    moves++;
    document.getElementById('moves').innerText = moves;
    checkForMatch();
  }

  function checkForMatch() {
    let isMatch = firstCard.dataset.emoji === secondCard.dataset.emoji;
    isMatch ? disableCards() : unflipCards();
  }

  function disableCards() {
    firstCard.removeEventListener('click', flipCard);
    secondCard.removeEventListener('click', flipCard);
    matches++;
    if(matches === 8) setTimeout(() => alert(`You win in ${moves} moves!`), 500);
    resetBoard();
  }

  function unflipCards() {
    lockBoard = true;
    setTimeout(() => {
      firstCard.classList.remove('flipped');
      secondCard.classList.remove('flipped');
      resetBoard();
    }, 1000);
  }

  function resetBoard() {
    [hasFlippedCard, lockBoard] = [false, false];
    [firstCard, secondCard] = [null, null];
  }
</script>

<script>
// --- Game Focus & Scroll Prevention ---
if (!window.__game_focus_injected) {
  window.__game_focus_injected = true;
  window.addEventListener('click', () => window.focus());
  window.addEventListener('keydown', (e) => {
    if(['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
      e.preventDefault();
    }
  });
}
// --------------------------------------
</script>

</body>
</html>
