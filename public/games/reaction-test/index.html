<!DOCTYPE html>
<html>
<head>
<title>Reaction Test</title>
<style>
  body { display: flex; flex-direction: column; align-items: center; font-family: sans-serif; margin-top: 50px; background: transparent; }
  #box { width: 300px; height: 300px; background: transparent; display: flex; justify-content: center; align-items: center; color: white; font-size: 24px; font-weight: bold; text-align: center; cursor: pointer; user-select: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  #results { margin-top: 20px; font-size: 20px; }
</style>
  <link rel="stylesheet" href="../shared-arcade.css">
</head>
<body>
  <h1>Reaction Time Test</h1>
  <div id="box">Click to Start</div>
  <div id="results"></div>

<script>
  const box = document.getElementById('box');
  const results = document.getElementById('results');
  let state = 'start'; // start, waiting, ready
  let startTime;
  let timeout;

  box.addEventListener('click', () => {
    if (state === 'start') {
      box.style.background = '#e74c3c';
      box.innerText = 'Wait for green...';
      state = 'waiting';
      timeout = setTimeout(() => {
        box.style.background = '#2ecc71';
        box.innerText = 'CLICK!';
        state = 'ready';
        startTime = new Date().getTime();
      }, Math.random() * 3000 + 1000);
    } else if (state === 'waiting') {
      clearTimeout(timeout);
      box.style.background = '#3498db';
      box.innerText = 'Too early! Click to try again.';
      state = 'start';
    } else if (state === 'ready') {
      let time = new Date().getTime() - startTime;
      box.style.background = '#3498db';
      box.innerText = 'Click to Start';
      results.innerText = `Your time: ${time} ms`;
      state = 'start';
    }
  });
</script>

<script>
// --- Game Focus & Scroll Prevention ---
if (!window.__game_focus_injected) {
  window.__game_focus_injected = true;
  window.addEventListener('click', () => window.focus());
  window.addEventListener('keydown', (e) => {
    if(['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
      e.preventDefault();
    }
  });
}
// --------------------------------------
</script>

</body>
</html>
