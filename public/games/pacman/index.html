<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>吃豆人</title>
<style>
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: transparent; margin: 0; color: white; font-family: sans-serif; }
  canvas { border: 2px solid #555; }
  p { color: #aaa; margin-top: 10px; }
</style>
  <link rel="stylesheet" href="../shared-arcade.css">
</head>
<body>
  <h2>简易吃豆人</h2>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <p>得分: <span id="score">0</span> | 使用方向键移动</p>
<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');

  const SIZE = 20;
  const COLS = canvas.width / SIZE;
  const ROWS = canvas.height / SIZE;

  let pacman = { x: 1, y: 1, dir: { x: 0, y: 0 } };
  let dots = [];
  let score = 0;

  // Create maze walls
  let walls = Array(ROWS).fill().map(() => Array(COLS).fill(0));
  for(let r = 0; r < ROWS; r++) {
    for(let c = 0; c < COLS; c++) {
      if (r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1) walls[r][c] = 1;
      else if (r % 2 === 0 && c % 2 === 0) walls[r][c] = 1;
      else dots.push({ x: c, y: r, eaten: false });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Walls (Neon Style)
    ctx.fillStyle = 'rgba(0, 0, 255, 0.3)';
    ctx.strokeStyle = '#00d4ff';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#00d4ff';
    ctx.shadowBlur = 10;
    
    for(let r = 0; r < ROWS; r++) {
      for(let c = 0; c < COLS; c++) {
        if(walls[r][c]) {
          ctx.fillRect(c * SIZE, r * SIZE, SIZE, SIZE);
          ctx.strokeRect(c * SIZE + 2, r * SIZE + 2, SIZE - 4, SIZE - 4);
        }
      }
    }
    ctx.shadowBlur = 0;

    // Dots
    ctx.font = '12px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    dots.forEach(d => {
      if(!d.eaten) {
        ctx.fillText('🍕', d.x * SIZE + SIZE / 2, d.y * SIZE + SIZE / 2);
      }
    });

    // Pacman
    ctx.font = '18px Arial';
    // Decide which emoji based on direction
    let pacmanEmoji = '😀';
    if(pacman.dir.x === 1) pacmanEmoji = '😋';
    if(pacman.dir.x === -1) pacmanEmoji = '😋'; // Or something else if available
    ctx.fillText(pacmanEmoji, pacman.x * SIZE + SIZE / 2, pacman.y * SIZE + SIZE / 2);
  }

  function update() {
    let nx = pacman.x + pacman.dir.x;
    let ny = pacman.y + pacman.dir.y;
    if(!walls[ny][nx]) {
      pacman.x = nx;
      pacman.y = ny;
      let dot = dots.find(d => d.x === nx && d.y === ny && !d.eaten);
      if(dot) {
        dot.eaten = true;
        score += 10;
        scoreEl.textContent = score;
        if(dots.every(d => d.eaten)) {
          alert('你赢了！得分: ' + score);
          document.location.reload();
        }
      }
    }
    draw();
  }

  document.addEventListener('keydown', e => {
    if(e.key === 'ArrowUp') pacman.dir = { x: 0, y: -1 };
    else if(e.key === 'ArrowDown') pacman.dir = { x: 0, y: 1 };
    else if(e.key === 'ArrowLeft') pacman.dir = { x: -1, y: 0 };
    else if(e.key === 'ArrowRight') pacman.dir = { x: 1, y: 0 };
  });

  draw();
  setInterval(update, 200);
</script>

<script>
// --- Game Focus & Scroll Prevention ---
if (!window.__game_focus_injected) {
  window.__game_focus_injected = true;
  window.addEventListener('click', () => window.focus());
  window.addEventListener('keydown', (e) => {
    if(['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
      e.preventDefault();
    }
  });
}
// --------------------------------------
</script>

</body>
</html>
