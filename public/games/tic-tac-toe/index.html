<!DOCTYPE html>
<html>
<head>
<title>Tic-Tac-Toe</title>
<style>
  body { display: flex; flex-direction: column; align-items: center; font-family: sans-serif; margin-top: 50px; }
  .board { display: grid; grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 100px); gap: 5px; z-index: 100; position: relative; }
  .cell { display: flex; justify-content: center; align-items: center; width: 100px; height: 100px; min-height: 48px; background: rgba(0,0,0,0.5); font-size: 48px; cursor: pointer; border: 1px solid rgba(0,212,255,0.2); touch-action: manipulation; }
  .cell:hover { background: rgba(0,212,255,0.1); }
  #message { margin-top: 20px; font-size: 24px; font-weight: bold; text-shadow: 0 0 10px rgba(0,212,255,0.5); }
  button { margin-top: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer; position: relative; z-index: 100; }
</style>
  <link rel="stylesheet" href="../shared-arcade.css">
</head>
<body>
  <h1>Tic-Tac-Toe</h1>
  <div class="board" id="board">
    <div class="cell" onclick="makeMove(0)"></div>
    <div class="cell" onclick="makeMove(1)"></div>
    <div class="cell" onclick="makeMove(2)"></div>
    <div class="cell" onclick="makeMove(3)"></div>
    <div class="cell" onclick="makeMove(4)"></div>
    <div class="cell" onclick="makeMove(5)"></div>
    <div class="cell" onclick="makeMove(6)"></div>
    <div class="cell" onclick="makeMove(7)"></div>
    <div class="cell" onclick="makeMove(8)"></div>
  </div>
  <div id="message">Player X's turn</div>
  <button onclick="reset()">Restart</button>

<script>
  let board = ["", "", "", "", "", "", "", "", ""];
  let currentPlayer = "X";
  let active = true;

  const winConditions = [
    [0, 1, 2], [3, 4, 5], [6, 7, 8],
    [0, 3, 6], [1, 4, 7], [2, 5, 8],
    [0, 4, 8], [2, 4, 6]
  ];

  window.makeMove = function(index) {
    if (board[index] !== "" || !active) return;
    board[index] = currentPlayer;
    const cell = document.getElementsByClassName("cell")[index];
    cell.innerText = currentPlayer;
    cell.style.color = currentPlayer === 'X' ? '#00d4ff' : '#a855f7';
    cell.style.textShadow = currentPlayer === 'X' ? '0 0 10px #00d4ff' : '0 0 10px #a855f7';
    
    checkWin();
    if(active) {
      currentPlayer = currentPlayer === "X" ? "O" : "X";
      document.getElementById("message").innerText = `Player ${currentPlayer}'s turn`;
    }
  }

  function checkWin() {
    let won = false;
    for (let i = 0; i < winConditions.length; i++) {
      const [a, b, c] = winConditions[i];
      if (board[a] && board[a] === board[b] && board[a] === board[c]) { won = true; break; }
    }
    if (won) {
      document.getElementById("message").innerText = `Player ${currentPlayer} Wins!`;
      active = false;
      return;
    }
    if (!board.includes("")) {
      document.getElementById("message").innerText = "Draw!";
      active = false;
      return;
    }
  }

  window.reset = function() {
    board = ["", "", "", "", "", "", "", "", ""];
    currentPlayer = "X";
    active = true;
    document.getElementById("message").innerText = `Player X's turn`;
    let cells = document.getElementsByClassName("cell");
    for(let i=0; i<cells.length; i++) {
        cells[i].innerText = "";
        cells[i].style.color = "";
        cells[i].style.textShadow = "";
    }
  }
</script>

<script>
// --- Game Focus & Scroll Prevention ---
if (!window.__game_focus_injected) {
  window.__game_focus_injected = true;
  window.addEventListener('click', () => window.focus());
  window.addEventListener('keydown', (e) => {
    if(['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
      e.preventDefault();
    }
  });
}
// --------------------------------------
</script>

</body>
</html>
