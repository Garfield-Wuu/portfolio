<!DOCTYPE html>
<html>
<head>
<title>Space Invaders</title>
<style>
  body { display: flex; flex-direction: column; align-items: center; background: transparent; color: #0f0; font-family: monospace; margin-top: 20px; }
  canvas { border: 2px solid #0f0; background: transparent; }
</style>
  <link rel="stylesheet" href="../shared-arcade.css">
</head>
<body>
  <h1>Space Invaders</h1>
  <p>Score: <span id="score">0</span></p>
  <canvas id="game" width="600" height="400"></canvas>
  <p>Left/Right to move, Space to shoot.</p>

<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  
  let player = { x: 275, y: 360, w: 50, h: 20, speed: 5, dx: 0 };
  let bullets = [];
  let enemies = [];
  let enemyBullets = [];
  let score = 0;
  let rows = 4, cols = 8;
  let enemyDir = 1, enemySpeed = 1;
  let left = false, right = false;

  function initEnemies() {
    enemies = [];
    for(let r=0; r<rows; r++) {
      for(let c=0; c<cols; c++) {
        // Adjust width and height to fit emojis, e.g., 40x40
        enemies.push({ x: 50 + c * 50, y: 50 + r * 40, w: 40, h: 40, alive: true });
      }
    }
  }

  function draw() {
    ctx.clearRect(0,0, canvas.width, canvas.height);
    
    // Player
    ctx.font = '40px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🚀', player.x + player.w/2, player.y + player.h/2);

    // Player Bullets
    ctx.font = '20px sans-serif';
    bullets.forEach(b => ctx.fillText('⚡', b.x, b.y));

    // Enemy Bullets
    ctx.font = '20px sans-serif';
    enemyBullets.forEach(b => ctx.fillText('🔥', b.x, b.y));

    // Enemies
    ctx.font = '35px sans-serif';
    enemies.forEach(e => { 
        if(e.alive) {
            ctx.fillText('👾', e.x + e.w/2, e.y + e.h/2); 
        }
    });
  }

  function update() {
    if(left && player.x > 0) player.x -= player.speed;
    if(right && player.x + player.w < canvas.width) player.x += player.speed;

    bullets.forEach(b => b.y -= 7);
    bullets = bullets.filter(b => b.y > 0);

    enemyBullets.forEach(b => b.y += 5);
    enemyBullets = enemyBullets.filter(b => b.y < canvas.height);

    let moveDown = false;
    enemies.forEach(e => {
      if(e.alive) {
        e.x += enemySpeed * enemyDir;
        if(e.x + e.w > canvas.width || e.x < 0) moveDown = true;
      }
    });

    if(moveDown) {
      enemyDir *= -1;
      enemies.forEach(e => { if(e.alive) e.y += 20; });
    }

    if(Math.random() < 0.05 && enemies.length > 0) {
      let aliveEnemies = enemies.filter(e => e.alive);
      if(aliveEnemies.length > 0) {
        let shooter = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)];
        enemyBullets.push({ x: shooter.x + shooter.w/2, y: shooter.y + shooter.h });
      }
    }

    bullets.forEach(b => {
      enemies.forEach(e => {
        if(e.alive && b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
          e.alive = false; b.y = -100; score += 10;
          document.getElementById('score').innerText = score;
        }
      });
    });

    enemyBullets.forEach(b => {
      if(b.x > player.x && b.x < player.x + player.w && b.y > player.y && b.y < player.y + player.h) {
        alert("Game Over! Score: " + score);
        score = 0; initEnemies(); bullets = []; enemyBullets = [];
      }
    });

    enemies.forEach(e => {
      if(e.alive && e.y + e.h > player.y) {
        alert("Game Over! Score: " + score);
        score = 0; initEnemies(); bullets = []; enemyBullets = [];
      }
    });

    if(enemies.filter(e => e.alive).length === 0) {
      enemySpeed += 0.5;
      initEnemies();
    }
  }

  window.addEventListener('keydown', e => {
    if(e.key === 'ArrowLeft') left = true;
    if(e.key === 'ArrowRight') right = true;
    if(e.key === ' ') { bullets.push({ x: player.x + player.w/2 - 2, y: player.y }); }
  });
  window.addEventListener('keyup', e => {
    if(e.key === 'ArrowLeft') left = false;
    if(e.key === 'ArrowRight') right = false;
  });

  initEnemies();
  setInterval(() => { update(); draw(); }, 1000/60);
</script>

<script>
// --- Game Focus & Scroll Prevention ---
if (!window.__game_focus_injected) {
  window.__game_focus_injected = true;
  window.addEventListener('click', () => window.focus());
  window.addEventListener('keydown', (e) => {
    if(['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
      e.preventDefault();
    }
  });
}
// --------------------------------------
</script>

</body>
</html>
